<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DWS Agent 值班台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06151d;
      --panel: #102431;
      --panel-2: #1b2e3a;
      --control: #0c1d27;
      --control-deep: #051219;
      --line: #30434d;
      --line-strong: #465962;
      --text: #f2f6f5;
      --text-secondary: #c9d2d1;
      --muted: #8e9c9e;
      --accent: #4ed6c0;
      --accent-ink: #4ed6c0;
      --accent-text: #101416;
      --accent-soft: rgba(78,214,192,.1);
      --accent-border: rgba(78,214,192,.34);
      --accent-2: #56c596;
      --accent-2-ink: #56c596;
      --accent-2-soft: rgba(86,197,150,.09);
      --accent-2-border: rgba(86,197,150,.4);
      --accent-3: #f5bd4f;
      --accent-3-ink: #f5bd4f;
      --accent-3-soft: rgba(245,189,79,.09);
      --accent-3-border: rgba(245,189,79,.4);
      --normal: #56c596;
      --attention: #f5bd4f;
      --urgent: #e85332;
      --success: #56c596;
      --success-ink: #56c596;
      --success-soft: rgba(86,197,150,.12);
      --success-border: rgba(86,197,150,.42);
      --info: #4ed6c0;
      --info-ink: #4ed6c0;
      --info-soft: rgba(78,214,192,.12);
      --info-border: rgba(78,214,192,.42);
      --warning: #f5bd4f;
      --warning-ink: #f5bd4f;
      --warning-soft: rgba(245,189,79,.12);
      --warning-border: rgba(245,189,79,.38);
      --danger: #e85332;
      --danger-ink: #ff7659;
      --danger-soft: rgba(232,83,50,.12);
      --danger-border: rgba(232,83,50,.4);
      --lime: var(--accent);
      --cyan: var(--accent);
      --red: var(--danger);
      --amber: var(--warning);
      --purple: var(--accent);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 0%, var(--accent-soft), transparent 28rem),
        radial-gradient(circle at 95% 12%, var(--accent-2-soft), transparent 25rem),
        radial-gradient(circle at 55% 100%, var(--accent-3-soft), transparent 32rem),
        var(--bg);
      color: var(--text);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    select { font: inherit; }
    .shell { width: min(1480px, calc(100% - 40px)); margin: 0 auto; padding: 28px 0 48px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 22px; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .mark {
      width: 46px; height: 46px; display: grid; place-items: center; overflow: hidden;
      border: 1px solid var(--accent-border); border-radius: 14px; background: var(--accent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 8px 24px var(--accent-soft);
    }
    .mark svg { width: 34px; height: 34px; display: block; }
    .mark .glyph { fill: var(--accent-text); }
    h1 { margin: 0; font-size: 20px; letter-spacing: -.02em; }
    .eyebrow { color: var(--muted); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .service-state { display: flex; align-items: center; gap: 10px; color: var(--muted); }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .settings-link {
      width: 38px; height: 38px; display: grid; place-items: center;
      color: var(--text); text-decoration: none; font-size: 20px; line-height: 1;
      background: var(--control); border: 1px solid var(--line); border-radius: 11px;
    }
    .settings-link:hover, .settings-link:focus-visible { color: var(--lime); border-color: var(--cyan); outline: none; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 0 5px var(--danger-soft); }
    .pulse.live { background: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); }
    .metrics { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 14px; }
    .metric, .panel { border: 1px solid var(--line); background: var(--panel); border-radius: var(--radius); }
    .metric { padding: 16px 18px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 4px; font-size: 25px; letter-spacing: -.04em; }
    .metric strong.brand { color: var(--accent-ink); }
    .metric strong.success { color: var(--success-ink); }
    .metric strong.info { color: var(--info-ink); }
    .metric strong.warning { color: var(--warning-ink); }
    .metric strong.danger { color: var(--danger-ink); }
    .workbench { display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(280px, .7fr); gap: 14px; margin-bottom: 14px; }
    .panel { padding: 20px; min-width: 0; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .panel h2 { margin: 0; font-size: 14px; letter-spacing: .02em; }
    .hint { color: var(--muted); font-size: 12px; }
    .active-list, .queue-list, .recent-list { display: grid; gap: 10px; }
    .active-card {
      background: linear-gradient(90deg, var(--info-soft), transparent 28rem), var(--panel-2);
      border: 1px solid var(--line-strong); border-left: 3px solid var(--info); border-radius: 15px; padding: 18px;
    }
    .active-top, .run-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .person { font-size: 17px; font-weight: 700; }
    .request { color: var(--text-secondary); margin: 9px 0 16px; max-width: 78ch; white-space: pre-wrap; }
    .badge { display: inline-flex; align-items: center; min-height: 25px; padding: 2px 9px; border: 1px solid var(--line-strong); border-radius: 999px; color: var(--text-secondary); background: var(--control); font-size: 12px; white-space: nowrap; }
    .badge.brand { color: var(--accent-ink); border-color: var(--accent-border); background: var(--accent-soft); }
    .badge.success { color: var(--success-ink); border-color: var(--success-border); background: var(--success-soft); }
    .badge.info { color: var(--info-ink); border-color: var(--info-border); background: var(--info-soft); }
    .badge.warning { color: var(--warning-ink); border-color: var(--warning-border); background: var(--warning-soft); }
    .badge.danger { color: var(--danger-ink); border-color: var(--danger-border); background: var(--danger-soft); }
    .badge.muted { color: var(--muted); }
    .steps { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; }
    .step { min-width: 0; }
    .step-line { height: 4px; border-radius: 999px; background: var(--line); margin-bottom: 7px; }
    .step.done .step-line { background: var(--success); }
    .step.current .step-line { background: var(--info); box-shadow: 0 0 0 1px var(--info-border); }
    .step-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 10px; }
    .step.current .step-label { color: var(--text); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px 16px; color: var(--muted); font-size: 12px; margin-top: 14px; }
    .queue-item { padding: 13px 14px; border: 1px solid var(--line); border-left: 3px solid var(--warning); border-radius: 13px; background: linear-gradient(90deg, var(--warning-soft), transparent 16rem), var(--panel-2); }
    .queue-item strong { display: block; }
    .queue-item .request { margin: 6px 0 8px; }
    .empty { display: grid; place-items: center; min-height: 130px; color: var(--muted); border: 1px dashed var(--line); border-radius: 14px; text-align: center; padding: 20px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    select { color: var(--text); background: var(--control); border: 1px solid var(--line); border-radius: 10px; padding: 7px 30px 7px 10px; }
    .run {
      --tone: var(--line-strong); --tone-soft: transparent;
      border: 1px solid var(--line); border-left: 3px solid var(--tone); border-radius: 14px;
      background: linear-gradient(90deg, var(--tone-soft), transparent 24rem), var(--panel-2); overflow: hidden;
    }
    .run.tone-success { --tone: var(--success); --tone-soft: var(--success-soft); }
    .run.tone-info { --tone: var(--info); --tone-soft: var(--info-soft); }
    .run.tone-warning { --tone: var(--warning); --tone-soft: var(--warning-soft); }
    .run.tone-danger { --tone: var(--danger); --tone-soft: var(--danger-soft); }
    .run summary { list-style: none; cursor: pointer; padding: 15px 16px; }
    .run summary::-webkit-details-marker { display: none; }
    .run:hover { border-color: var(--line-strong); border-left-color: var(--tone); }
    .run-title { min-width: 0; }
    .run-title strong { margin-right: 10px; }
    .run-title p { margin: 5px 0 0; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .run-time { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .run-body { border-top: 1px solid var(--line); padding: 16px; display: grid; gap: 14px; color: var(--text-secondary); }
    .detail-block h3 { margin: 0 0 6px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
    .detail-block p { margin: 0; white-space: pre-wrap; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { max-width: 100%; overflow-wrap: anywhere; border: 1px solid var(--line); background: var(--control); border-radius: 8px; padding: 4px 8px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .code-change { border-left: 2px solid var(--cyan); padding-left: 12px; }
    footer { color: var(--muted); font-size: 12px; display: flex; justify-content: space-between; gap: 12px; margin-top: 14px; }
    @media (max-width: 900px) {
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workbench { grid-template-columns: 1fr; }
      .steps { grid-template-columns: repeat(4, 1fr); }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml">
  <link rel="stylesheet" href="/app.css?v=1">
  <script src="/theme.js"></script>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" focusable="false">
            <path class="glyph" fill-rule="evenodd" d="M11 9h26a7 7 0 0 1 7 7v13a7 7 0 0 1-7 7H26l-10 7 2-7h-7a7 7 0 0 1-7-7V16a7 7 0 0 1 7-7Zm4 10h10v-5l10 10-10 10v-5H15a5 5 0 0 1 0-10Z"/>
          </svg>
        </div>
        <div><div class="eyebrow">钉钉代理值班台</div><h1>DWS Chat Agent</h1></div>
      </div>
      <div class="header-actions">
        <div class="service-state"><span id="pulse" class="pulse"></span><span id="serviceText">正在连接本地代理…</span></div>
        <a class="settings-link" href="/settings" aria-label="打开 Agent 配置" title="Agent 配置">⚙</a>
      </div>
    </header>

    <section id="metrics" class="metrics"></section>

    <section class="workbench">
      <article class="panel">
        <div class="panel-head"><h2>现在正在处理</h2><span class="hint">真实阶段 · 不显示虚假百分比</span></div>
        <div id="active" class="active-list"></div>
      </article>
      <aside class="panel">
        <div class="panel-head"><h2>等待队列</h2><span id="queueCount" class="hint"></span></div>
        <div id="queue" class="queue-list"></div>
      </aside>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div><h2>处理时间线</h2><span class="hint">点击展开代码、验证与告警</span></div>
        <div class="filters">
          <select id="contactFilter" aria-label="联系人筛选"><option value="">全部联系人</option></select>
          <select id="statusFilter" aria-label="状态筛选"><option value="">全部状态</option></select>
        </div>
      </div>
      <div id="recent" class="recent-list"></div>
    </section>
    <footer><span>本机控制台 · 仅监听 127.0.0.1 · 状态每 3 秒刷新</span><span id="updated"></span></footer>
  </main>

  <script>
    const PHASES = [
      ["stabilizing", "合并消息"], ["screening", "规则检查"], ["routing", "前置 Agent"],
      ["acknowledged", "已确认"], ["worker", "后置 Agent"], ["steering", "补充已 Steer"],
      ["verifying", "代码核验"], ["freshness", "发送前复查"], ["sending", "发送"]
    ];
    const STATUS = {
      sent: ["已回复", "success"], shadow: ["影子回复", "info"], no_reply: ["无需回复", "muted"],
      human_cooldown: ["人工接管", "warning"], refused: ["安全拒绝", "danger"], error: ["处理失败", "danger"],
      stale_supplement: ["补充后重算", "info"], delivery_replan: ["交付重算", "info"],
      invalid_reply: ["回复重算", "info"]
    };
    let snapshot = null;
    let recentRenderKey = "";
    const openRuns = new Set();

    const node = (tag, cls, text) => {
      const value = document.createElement(tag);
      if (cls) value.className = cls;
      if (text !== undefined && text !== null) value.textContent = String(text);
      return value;
    };
    const clear = value => { while (value.firstChild) value.removeChild(value.firstChild); };
    const time = value => value ? new Intl.DateTimeFormat("zh-CN", {hour:"2-digit", minute:"2-digit", second:"2-digit"}).format(new Date(value)) : "-";
    const duration = (start, end = Date.now()) => {
      const seconds = Math.max(0, Math.floor((new Date(end).getTime() - new Date(start).getTime()) / 1000));
      if (seconds < 60) return `${seconds}s`;
      return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
    };
    const statusBadge = status => {
      const [label, cls] = STATUS[status] || [status || "未知", "muted"];
      return node("span", `badge ${cls}`, label);
    };
    const statusTone = status => (STATUS[status] || ["", "muted"])[1];
    const modelLane = (sessionId, workflow = snapshot?.workflow) => {
      if (!sessionId?.startsWith("dm-")) return "";
      const stage = (workflow?.stages || []).find(item => {
        const slug = String(item.agent || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        return slug && sessionId.includes(`-${slug}-`);
      });
      if (stage) return stage.label || stage.agent;
      if (sessionId.includes("-luna-sol-")) return "Luna → Sol";
      if (sessionId.includes("-luna-")) return "Luna";
      if (sessionId.includes("-sol-")) return "Sol";
      return "Codex（旧）";
    };

    function renderMetrics(data) {
      const box = document.getElementById("metrics"); clear(box);
      [["正在执行", data.summary.active, "info"], ["等待队列", data.summary.queued, "warning"],
       ["今日回复", data.summary.sentToday, "success"], ["今日代码任务", data.summary.changesToday, "brand"],
       ["今日失败", data.summary.errorsToday, "danger"]].forEach(([label, value, cls]) => {
        const card = node("div", "metric"); card.append(node("span", "", label), node("strong", cls || "", value)); box.append(card);
      });
    }

    function renderActive(items) {
      const box = document.getElementById("active"); clear(box);
      if (!items.length) { box.append(node("div", "empty", "当前没有正在执行的私聊任务")); return; }
      items.forEach(item => {
        const card = node("article", "active-card");
        const top = node("div", "active-top");
        const identity = node("div"); identity.append(node("div", "person", item.contactName), node("div", "hint", item.contactAlias || ""));
        top.append(identity, node("span", "badge info", item.phaseLabel || "处理中")); card.append(top);
        if (item.requestPreview) card.append(node("p", "request", item.requestPreview));
        const steps = node("div", "steps");
        const current = Math.max(0, PHASES.findIndex(([key]) => key === item.phase));
        PHASES.forEach(([key, label], index) => {
          const step = node("div", `step ${index < current ? "done" : index === current ? "current" : ""}`);
          step.append(node("div", "step-line"), node("div", "step-label", label)); steps.append(step);
        });
        card.append(steps);
        const meta = node("div", "meta");
        meta.append(node("span", "", `已运行 ${duration(item.startedAt)}`), node("span", "", `第 ${item.attempt || 1} 次处理`), node("span", "", `${item.batchSize || 1} 条消息`));
        if (item.sessionId) meta.append(node("span", "", `session ${item.sessionId.slice(-10)}`));
        card.append(meta); box.append(card);
      });
    }

    function renderQueue(items) {
      const box = document.getElementById("queue"); clear(box);
      document.getElementById("queueCount").textContent = `${items.length} 个会话`;
      if (!items.length) { box.append(node("div", "empty", "没有等待任务")); return; }
      items.forEach(item => {
        const row = node("div", "queue-item");
        row.append(node("strong", "", item.contactName), node("p", "request", item.requestPreview || "请求摘要未保存"), node("span", "hint", `等待 ${duration(item.receivedAt)} · ${item.batchSize} 条 · ${item.contentLength} 字`)); box.append(row);
      });
    }

    function addBlock(parent, title, values) {
      const list = (Array.isArray(values) ? values : [values]).filter(Boolean);
      if (!list.length) return;
      const block = node("section", "detail-block"); block.append(node("h3", "", title));
      list.forEach(value => block.append(node("p", "", value))); parent.append(block);
    }

    function renderRecent(force = false) {
      const box = document.getElementById("recent");
      const contact = document.getElementById("contactFilter").value;
      const status = document.getElementById("statusFilter").value;
      const items = (snapshot?.recent || []).filter(item => (!contact || item.contactName === contact) && (!status || item.status === status));
      const nextKey = JSON.stringify([contact, status, items]);
      if (!force && nextKey === recentRenderKey) return;
      recentRenderKey = nextKey;
      clear(box);
      if (!items.length) { box.append(node("div", "empty", "当前筛选下没有处理记录")); return; }
      items.forEach(item => {
        const details = node("details", `run tone-${statusTone(item.status)}`); const summary = node("summary"); const top = node("div", "run-top");
        const title = node("div", "run-title"); const line = node("div"); line.append(node("strong", "", item.contactName), statusBadge(item.status));
        const lane = modelLane(item.sessionId); if (lane) line.append(node("span", "badge brand", lane));
        title.append(line, node("p", "", item.requestPreview || "历史记录未保存请求摘要"));
        top.append(title, node("span", "run-time", `${time(item.finishedAt)} · ${duration(item.startedAt, item.finishedAt)}`)); summary.append(top); details.append(summary);
        const body = node("div", "run-body"); addBlock(body, "对方消息", item.requestPreview || "历史记录未保存请求摘要"); addBlock(body, "模型路径", lane); addBlock(body, "处理结果", item.handled); addBlock(body, "原因", item.reason); addBlock(body, "验证", item.validation); addBlock(body, "告警", item.warnings); addBlock(body, "外部调用", item.externalCalls);
        (item.changes || []).forEach(change => {
          const code = node("section", "detail-block code-change"); code.append(node("h3", "", change.repo || "代码改动"));
          addBlock(code, "分支 / Commit", [change.branch, change.head_sha]); addBlock(code, "推送目标", change.pushed_to);
          if ((change.files || []).length) { const chips = node("div", "chips"); change.files.forEach(file => chips.append(node("span", "chip", file))); code.append(chips); }
          body.append(code);
        });
        details.append(body); details.open = openRuns.has(item.sessionId);
        details.addEventListener("toggle", () => details.open ? openRuns.add(item.sessionId) : openRuns.delete(item.sessionId));
        box.append(details);
      });
    }

    function populateFilters(data) {
      const contact = document.getElementById("contactFilter"); const previousContact = contact.value;
      const names = [...new Set(data.recent.map(item => item.contactName))].sort(); clear(contact); contact.append(new Option("全部联系人", "")); names.forEach(name => contact.append(new Option(name, name))); contact.value = previousContact;
      const status = document.getElementById("statusFilter"); const previousStatus = status.value;
      const statuses = [...new Set(data.recent.map(item => item.status))]; clear(status); status.append(new Option("全部状态", "")); statuses.forEach(value => status.append(new Option((STATUS[value] || [value])[0], value))); status.value = previousStatus;
    }

    async function refresh() {
      try {
        const response = await fetch("/api/snapshot", {cache: "no-store"}); if (!response.ok) throw new Error(`HTTP ${response.status}`);
        snapshot = await response.json(); const heartbeat = snapshot.service.heartbeatAt ? Date.now() - new Date(snapshot.service.heartbeatAt).getTime() : Infinity;
        const healthy = snapshot.service.running && heartbeat < 15000; document.getElementById("pulse").classList.toggle("live", healthy);
        document.getElementById("serviceText").textContent = healthy ? `${String(snapshot.service.mode).toUpperCase()} · 代理运行中 · PID ${snapshot.service.pid}` : "状态可能已过期";
        renderMetrics(snapshot); renderActive(snapshot.active); renderQueue(snapshot.queue); populateFilters(snapshot); renderRecent();
        document.getElementById("updated").textContent = `更新于 ${time(snapshot.generatedAt)}`;
      } catch (error) {
        document.getElementById("pulse").classList.remove("live"); document.getElementById("serviceText").textContent = "无法读取本地代理";
      }
    }
    document.getElementById("contactFilter").addEventListener("change", () => renderRecent(true));
    document.getElementById("statusFilter").addEventListener("change", () => renderRecent(true));
    refresh(); setInterval(refresh, 3000); setInterval(() => snapshot && renderActive(snapshot.active), 1000);
  </script>
</body>
</html>
